name: Hidden Window Gate

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  hidden-window-and-preflight:
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit scheduled tasks hidden-window rule
        shell: pwsh
        run: npm run audit:tasks:hidden

      - name: Preflight
        shell: pwsh
        run: npm run preflight
