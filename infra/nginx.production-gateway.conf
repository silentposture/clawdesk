map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

server {
  listen 80;
  server_name api.clawdesk.example;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name api.clawdesk.example;

  ssl_certificate /etc/letsencrypt/live/api.clawdesk.example/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.clawdesk.example/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:ClawDeskTLS:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 8m;

  location / {
    proxy_pass http://clawdesk-gateway:19130;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
