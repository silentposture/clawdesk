services:
  mock-gateway:
    image: node:22-alpine
    working_dir: /workspace
    command: ["sh", "-c", "node sidecars/mock-gateway/server.mjs"]
    ports:
      - "18890:18890"
    environment:
      OPENCLAW_MOCK_PORT: "18890"
      CLAWDESK_IDENTITY_BACKEND_URL: "http://backend-auth:19090"
      CLAWDESK_MOCK_STATE_FILE: "/workspace/.clawdesk-mock/state.json"
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=128"
    volumes:
      - .:/workspace
    restart: unless-stopped

  mock-mail:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped
